{% extends 'base.html' %}
{% block title %}Sil · LinkVault{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-body">
                <h4 class="text-danger">Koleksiyonu Sil</h4>
                <p>"<strong>{{ object.name }}</strong>" silinecek. İçindeki bookmark'lar silinmez,
                   sadece koleksiyonsuz kalır.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Evet, Sil</button>
                    <a href="{% url 'collection_list' %}" class="btn btn-secondary">İptal</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
